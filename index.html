// Seasonality multipliers
var MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
var seasonality = [0.7, 0.85, 1.0, 1.1, 1.0, 0.8, 0.7, 0.8, 1.0, 1.1, 1.3, 1.8];

// State
var currentFilter = 'all';
var sortCol = 'velocity';
var sortAsc = false;
var computed = [];

// ============================================================
// INIT
// ============================================================
function init() {
  buildSeasonality();
  recalculate();
}

// ============================================================
// VELOCITY CALCULATION
// ============================================================
function getVelocity(p) {
  var src = document.getElementById('cfgVelocitySource').value;
  var marchDays = parseInt(document.getElementById('cfgMarchDays').value) || 19;

  if (src === 'sellerboard') {
    return p.sbMar / marchDays;
  } else if (src === 'u30') {
    return p.u30 / 30;
  } else {
    // Weighted Excel: 50% Mar + 30% Feb + 20% Jan
    var janRate = p.jan / 31;
    var febRate = p.feb / 28;
    var marRate = p.mar / marchDays;
    return marRate * 0.5 + febRate * 0.3 + janRate * 0.2;
  }
}

// ============================================================
// RECALCULATE
// ============================================================
function recalculate() {
  var prepDays = parseInt(document.getElementById('cfgPrepDays').value) || 2;
  var shipDays = parseInt(document.getElementById('cfgShipDays').value) || 5;
  var coverageDays = parseInt(document.getElementById('cfgCoverageDays').value) || 120;
  var safetyDays = parseInt(document.getElementById('cfgSafetyDays').value) || 14;
  var leadTime = prepDays + shipDays;

  var currentMonth = 2; // March = index 2
  var currentMultiplier = seasonality[currentMonth];

  computed = PRODUCTS.map(function(p) {
    var baseVel = getVelocity(p);
    var velocity = baseVel;

    // Coverage days
    var coverageCurrent = velocity > 0 ? Math.round(p.stock / velocity) : (p.stock > 0 ? 9999 : 0);

    // Reorder point
    var reorderPoint = Math.round((leadTime + safetyDays) * velocity);

    // Units needed for target coverage (with seasonality)
    var unitsNeeded = 0;
    if (velocity > 0) {
      var daysRemaining = coverageDays;
      var monthIdx = currentMonth;
      var totalUnits = 0;
      while (daysRemaining > 0) {
        var daysInThisMonth = Math.min(daysRemaining, 30);
        var mult = seasonality[monthIdx % 12] / currentMultiplier;
        totalUnits += velocity * mult * daysInThisMonth;
        daysRemaining -= daysInThisMonth;
        monthIdx++;
      }
      unitsNeeded = Math.max(0, Math.ceil(totalUnits) - p.stock - p.inbound);
    }

    // Status
    var status, statusLabel;
    if (velocity === 0 && p.sbMar === 0 && p.u30 === 0) {
      status = 'nodemand';
      statusLabel = 'SIN DEMANDA';
    } else if (p.stock === 0 && p.total === 0) {
      status = 'oos';
      statusLabel = 'SIN STOCK';
    } else if (coverageCurrent <= leadTime) {
      status = 'critical';
      statusLabel = 'CRITICO';
    } else if (coverageCurrent <= leadTime + safetyDays) {
      status = 'urgent';
      statusLabel = 'URGENTE';
    } else if (coverageCurrent <= coverageDays * 0.5) {
      status = 'restock';
      statusLabel = 'REPONER';
    } else if (coverageCurrent <= coverageDays * 1.5) {
      status = 'ok';
      statusLabel = 'OK';
    } else {
      status = 'excess';
      statusLabel = 'EXCESO';
    }

    return {
      sku: p.sku, asin: p.asin, name: p.name, club: p.club, cat: p.cat,
      stock: p.stock, total: p.total, inbound: p.inbound, price: p.price,
      jan: p.jan, feb: p.feb, mar: p.mar, u30: p.u30, sbMar: p.sbMar, notes: p.notes,
      velocity: Math.round(velocity * 100) / 100,
      coverageDays: coverageCurrent,
      reorderPoint: reorderPoint,
      unitsNeeded: unitsNeeded,
      status: status,
      statusLabel: statusLabel,
      monthlyRevenue: Math.round(velocity * 30 * p.price * 100) / 100
    };
  });

  renderKPIs();
  renderCharts();
  renderTable();
  renderAlertBanner();
}

// ============================================================
// RENDER KPIs
// ============================================================
function renderKPIs() {
  var critical = computed.filter(function(p) { return p.status === 'critical'; }).length;
  var urgent = computed.filter(function(p) { return p.status === 'urgent'; }).length;
  var active = computed.filter(function(p) { return p.velocity > 0; });
  var totalVel = computed.reduce(function(s, p) { return s + p.velocity; }, 0);
  var totalStock = computed.reduce(function(s, p) { return s + p.stock; }, 0);
  var totalRev = computed.reduce(function(s, p) { return s + p.monthlyRevenue; }, 0);
  var avgCov = active.reduce(function(s, p) { return s + p.coverageDays; }, 0) / Math.max(1, active.length);

  document.getElementById('kpiRow').innerHTML =
    '<div class="kpi critical">' +
      '<div class="label">&#128308; Productos Criticos</div>' +
      '<div class="value">' + critical + '</div>' +
      '<div class="detail">' + urgent + ' urgentes adicionales</div>' +
    '</div>' +
    '<div class="kpi info">' +
      '<div class="label">&#128230; Velocidad Total</div>' +
      '<div class="value">' + totalVel.toFixed(1) + '</div>' +
      '<div class="detail">unidades/dia (todos los productos)</div>' +
    '</div>' +
    '<div class="kpi good">' +
      '<div class="label">&#127978; Stock Total FBA</div>' +
      '<div class="value">' + totalStock.toLocaleString('es-ES') + '</div>' +
      '<div class="detail">Cobertura media: ' + Math.round(avgCov) + ' dias</div>' +
    '</div>' +
    '<div class="kpi warning">' +
      '<div class="label">&#128176; Revenue Mensual Est.</div>' +
      '<div class="value">&euro;' + totalRev.toLocaleString('es-ES', {minimumFractionDigits: 0, maximumFractionDigits: 0}) + '</div>' +
      '<div class="detail">A velocidad actual de ventas</div>' +
    '</div>';
}

// ============================================================
// RENDER CHARTS
// ============================================================
function renderCharts() {
  var topVel = computed.filter(function(p) { return p.velocity > 0; }).sort(function(a, b) { return b.velocity - a.velocity; }).slice(0, 8);
  var maxVel = topVel.length ? topVel[0].velocity : 1;

  document.getElementById('chartVelocity').innerHTML = topVel.map(function(p) {
    var pct = (p.velocity / maxVel * 100).toFixed(0);
    var clubClass = p.club === 'Real Madrid' ? 'teal' : p.club === 'FC Barcelona' ? 'red' : p.club === 'Atletico' ? 'orange' : 'green';
    return '<div class="bar-row">' +
      '<span class="bar-label" title="' + p.name + '">' + p.name.substring(0, 25) + '</span>' +
      '<div class="bar-track">' +
        '<div class="bar-fill ' + clubClass + '" style="width:' + pct + '%">' +
          '<span class="bar-value">' + p.velocity.toFixed(2) + '/dia</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var urgentList = computed.filter(function(p) { return p.velocity > 0 && p.coverageDays < 9999; }).sort(function(a, b) { return a.coverageDays - b.coverageDays; }).slice(0, 8);
  var maxCov = 120;

  document.getElementById('chartUrgent').innerHTML = urgentList.map(function(p) {
    var pct = Math.min(100, (p.coverageDays / maxCov * 100)).toFixed(0);
    var barColor = p.coverageDays <= 7 ? 'red' : p.coverageDays <= 21 ? 'orange' : p.coverageDays <= 60 ? 'teal' : 'green';
    return '<div class="bar-row">' +
      '<span class="bar-label" title="' + p.name + '">' + p.name.substring(0, 25) + '</span>' +
      '<div class="bar-track">' +
        '<div class="bar-fill ' + barColor + '" style="width:' + pct + '%">' +
          '<span class="bar-value">' + p.coverageDays + 'd</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ============================================================
// RENDER TABLE
// ============================================================
var COLUMNS = [
  {key:'club', label:'Club', w:'60px'},
  {key:'name', label:'Producto', w:'220px'},
  {key:'cat', label:'Cat.', w:'80px'},
  {key:'velocity', label:'Vel./dia', w:'80px', num:true},
  {key:'stock', label:'Stock FBA', w:'80px', num:true},
  {key:'coverageDays', label:'Cobertura', w:'110px', num:true},
  {key:'status', label:'Estado', w:'110px'},
  {key:'reorderPoint', label:'Pto. Reorden', w:'100px', num:true},
  {key:'unitsNeeded', label:'Uds. Pedir', w:'110px', num:true},
  {key:'monthlyRevenue', label:'Rev. Mensual', w:'100px', num:true},
  {key:'notes', label:'Notas', w:'120px'}
];

function renderTableHead() {
  document.getElementById('tableHead').innerHTML = COLUMNS.map(function(c) {
    var sorted = sortCol === c.key;
    var arrow = sorted ? (sortAsc ? '&#9650;' : '&#9660;') : '&#11021;';
    return '<th class="' + (sorted ? 'sorted' : '') + '" style="width:' + c.w + '" onclick="sortTable(\'' + c.key + '\')">' +
      c.label + ' <span class="sort-arrow">' + arrow + '</span></th>';
  }).join('');
}

function renderTable() {
  renderTableHead();
  var search = document.getElementById('searchBox').value.toLowerCase();

  var rows = computed.filter(function(p) {
    if (search && p.name.toLowerCase().indexOf(search) === -1 && p.sku.toLowerCase().indexOf(search) === -1 && p.asin.toLowerCase().indexOf(search) === -1) return false;
    if (currentFilter !== 'all' && p.status !== currentFilter) return false;
    return true;
  });

  rows.sort(function(a, b) {
    var va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('tableBody').innerHTML = rows.map(function(p) {
    var clubIcon = p.club === 'Real Madrid' ? '<span class="club-icon club-rm">RM</span>' :
                   p.club === 'FC Barcelona' ? '<span class="club-icon club-fcb">FC</span>' :
                   p.club === 'Atletico' ? '<span class="club-icon club-atm">AT</span>' :
                   '<span class="club-icon club-pri">PR</span>';

    var catClass = p.cat.indexOf('Bloc') === 0 ? 'Bloc' : p.cat;
    var covPct = Math.min(100, p.coverageDays / 120 * 100);
    var covColor = p.coverageDays <= 7 ? '#ef4444' : p.coverageDays <= 21 ? '#f59e0b' : p.coverageDays <= 60 ? '#eab308' : '#10b981';

    return '<tr>' +
      '<td>' + clubIcon + '</td>' +
      '<td>' +
        '<div class="prod-name" title="' + p.name + '">' + p.name + '</div>' +
        '<div class="prod-sku">' + p.sku + '</div>' +
        '<div class="prod-asin"><a href="https://www.amazon.es/dp/' + p.asin + '" target="_blank">' + p.asin + '</a></div>' +
      '</td>' +
      '<td><span class="cat-tag cat-' + catClass + '">' + p.cat + '</span></td>' +
      '<td><strong>' + p.velocity.toFixed(2) + '</strong></td>' +
      '<td>' + p.stock.toLocaleString('es-ES') + (p.inbound > 0 ? ' <span style="color:#0d9488;font-size:11px">(+' + p.inbound + ')</span>' : '') + '</td>' +
      '<td>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div class="coverage-bar"><div class="coverage-fill" style="width:' + covPct + '%;background:' + covColor + '"></div></div>' +
          '<span style="font-size:12px;font-weight:600;color:' + covColor + '">' + (p.coverageDays > 999 ? '&#8734;' : p.coverageDays + 'd') + '</span>' +
         '</div>' +
      '</td>' +
      '<td><span class="status-badge status-' + p.status + '">&#9679; ' + p.statusLabel + '</span></td>' +
      '<td>' + (p.reorderPoint > 0 ? p.reorderPoint : '&mdash;') + '</td>' +
      '<td style="font-weight:' + (p.unitsNeeded > 0 ? '700' : '400') + ';color:' + (p.unitsNeeded > 0 ? '#dc2626' : '999') + '">' + (p.unitsNeeded > 0 ? p.unitsNeeded : '&mdash;') + '</td>' +
      '<td>&euro;' + p.monthlyRevenue.toLocaleString('es-ES', {minimumFractionDigits: 0}) + '</td>' +
      '<td class="note-cell"><input type="text" value="' + (p.notes || '') + '" onchange="updateNote(\'' + p.sku + '\', this.value)" placeholder="..."></td>' +
    '</tr>';
  }).join('');
}

// ============================================================
// ALERT BANNER
// ============================================================
function renderAlertBanner() {
  var critical = computed.filter(function(p) { return p.status === 'critical'; });
  var banner = document.getElementById('alertBanner');
  var text = document.getElementById('alertText');

  if (critical.length > 0) {
    var names = critical.map(function(p) { return '<strong>' + p.name.substring(0, 35) + '</strong> (' + p.coverageDays + 'd)'; }).join(', ');
    text.innerHTML = critical.length + ' producto(s) en estado CRITICO &mdash; stock para menos de ' + (parseInt(document.getElementById('cfgPrepDays').value) + parseInt(document.getElementById('cfgShipDays').value)) + ' dias: ' + names;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

// ============================================================
// SEASONALITY
// ============================================================
function buildSeasonality() {
  var grid = document.getElementById('seasonGrid');
  grid.innerHTML = MONTHS.map(function(m, i) {
    return '<div class="season-month">' +
      '<label>' + m + '</label>' +
      '<input type="number" step="0.05" min="0" max="3" value="' + seasonality[i] + '" onchange="updateSeason(' + i + ', this.value)">' +
    '</div>';
  }).join('');
  renderSeasonChart();
}

function updateSeason(idx, val) {
  seasonality[idx] = parseFloat(val) || 1;
  renderSeasonChart();
  recalculate();
}

function renderSeasonChart() {
  var max = Math.max.apply(null, seasonality);
  document.getElementById('seasonChart').innerHTML = MONTHS.map(function(m, i) {
    var h = (seasonality[i] / max * 100).toFixed(0);
    var color = seasonality[i] >= 1.3 ? '#ef4444' : seasonality[i] >= 1.0 ? '#0d9488' : seasonality[i] >= 0.8 ? '#f59e0b' : '#94a3b8';
    var isCurrent = i === 2;
    return '<div class="season-bar-wrap">' +
      '<div class="season-bar" style="height:' + h + '%;background:' + (isCurrent ? '#0d9488' : color) + ';opacity:' + (isCurrent ? 1 : 0.6) + '"></div>' +
      '<span class="season-bar-label" style="font-weight:' + (isCurrent ? '700' : '400') + '">' + m + '</span>' +
    '</div>';
  }).join('');
}

// ============================================================
function togglePanel(id) {
  var panel = document.getElementById(id + 'Panel');
  var isVisible = panel.style.display !== 'none';
  panel.style.display = isVisible ? 'none' : 'block';
}

function toggleExport() {
  document.getElementById('exportDropdown').classList.toggle('show');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.export-menu')) document.getElementById('exportDropdown').classList.remove('show');
});

function setFilter(f, btn) {
  currentFilter = f;
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  renderTable();
}

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = col === 'name' || col === 'club'; }
  renderTable();
}

function updateNote(sku, val) {
  for (var i = 0; i < PRODUCTS.length; i++) {
    if (PRODUCTS[i].sku === sku) { PRODUCTS[i].notes = val; break; }
  }
}

function exportCSV() {
  var headers = ['SKU','ASIN','Nombre','Club','Categoria','Stock FBA','Velocidad/dia','Cobertura dias','Estado','Punto Reorden','Unidades Pedir','Rev. Mensual EUR','Notas'];
  var rows = computed.map(function(p) {
    return [
      p.sku, p.asin, '"' + p.name + '"', p.club, p.cat, p.stock, p.velocity.toFixed(2),
      p.coverageDays > 999 ? 'Infinito' : p.coverageDays, p.statusLabel, p.reorderPoint,
      p.unitsNeeded, p.monthlyRevenue.toFixed(2), '"' + (p.notes || '') + '"'
    ];
  });
  var csv = [headers.join(';')].concat(rows.map(function(r) { return r.join(';'); })).join('\n');
  var blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'inventario-mocilab-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

init();
</script>
